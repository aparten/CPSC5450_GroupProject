services:
  frontend:
  # Frontend: Vite/TanStack Start frontend dev server
    container_name: soc-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

  backend:
  # Backend:Creates the backend service running FastAPI
    container_name: soc-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      #- /app/.venv # To avoid mounting local .venv, see: https://github.com/astral-sh/uv/issues/8342#issuecomment-2529780192 | IDK why this is necessary, but it works
      - ./backend/app/email_data:/app/email_data/ # Mounting input directory for email ingestion, put files in this folder to have them ingested by the system, this will be modified if we move to mailpit

    working_dir: /app/backend
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    environment:
      REDIS_DSN: "redis://:password123@redis"
      POSTGRES_DSN: "postgresql://username:password@postgres:5432/default_database"
      FRONTEND_HOST: "http://localhost:3000"
    depends_on: # ref: https://docs.docker.com/compose/how-tos/startup-order/
      postgres:
        condition: service_healthy
        restart: true


  worker:
  # Worker: contains the celery worker
    container_name: soc-worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./triage_engine:/app/triage_engine
      #- /app/.venv # See above comment
      - ./backend/app/email_data:/app/email_data/ # Mounting input directory for email ingestion, put files in this folder to have them ingested by the system, this will be modified if we move to mailpit
    working_dir: /app/backend
    command:
      - celery
      - --app
      - app.tasks.worker:app
      - worker
    environment:
      REDIS_DSN: "redis://:password123@redis"
      POSTGRES_DSN: "postgresql://username:password@postgres:5432/default_database"
    depends_on:
      - redis
      - postgres

  mailpit:
  # Optional: Mailpit service for email testing
      image: axllent/mailpit
      container_name: soc-mailpit-server
      restart: unless-stopped
      volumes:
          - ./svc_data/mailpit_data:/data
      ports:
          - 8025:8025
          - 1025:1025
      environment:
          MP_MAX_MESSAGES: 5000
          MP_DATABASE: /data/mailpit.db
          MP_SMTP_AUTH_ACCEPT_ANY: 1
          MP_SMTP_AUTH_ALLOW_INSECURE: 1
  redis:
  # Redis: Redis DB for caching, and queuing tasks
      image: redis:latest
      container_name: soc-redis
      restart: always
      volumes:
          - redis-data:/data
      ports:
          - "6379:6379"
      command:
          - redis-server
          - --save 20 1
          - --loglevel warning
          - --requirepass password123
  postgres:
  # Postgres: PostgreSQL database service
      image: postgres:latest
      container_name: soc-postgres
      restart: always
      ports:
          - "5432:5432"
      healthcheck:
          test: ["CMD-SHELL", "pg_isready -U username -d default_database"]
          interval: 10s
          timeout: 5s
          retries: 5
      # TODO: Change these credentials before deploying to production
      environment:
        POSTGRES_USER: username # The PostgreSQL user (useful to connect to the database)
        POSTGRES_PASSWORD: password # The PostgreSQL password (useful to connect to the database)
        POSTGRES_DB: default_database # The PostgreSQL default database (automatically created at first launch)
      volumes:
        - postgres-data:/var/lib/postgresql # See breaking change on PR https://github.com/docker-library/postgres/pull/1259
        - ./svc_data/postgres_init:/docker-entrypoint-initdb.d:ro # Mounting initialization scripts for PostgreSQL
  redisinsight:
  # RedisInsight: Web-based Redis GUI
  # connection string: redis://:password123@redis
    container_name: soc-redisinsight
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      - redis

  pgweb:
  # Pgweb: Web-based PostgreSQL database browser
    container_name: soc-pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - 8081:8081
    environment:
      - PGWEB_DATABASE_URL=postgres://username:password@postgres:5432/default_database?sslmode=disable
    depends_on:
      - postgres

volumes:
  redis-data:
    driver: local
  email-data:
    driver: local
  postgres-data:
    driver: local
  redisinsight-data:
    driver: local
